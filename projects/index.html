<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中荷人寿河南省分公司 · 十九周年庆</title>
  <link rel="preconnect" href="https://fonts.googleapis.cn">
  <link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin>
  <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
  <style>
    /* ========== Reset & Variables ========== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --red: #C41E3A;
      --red-deep: #9A1830;
      --gold: #D4A849;
      --gold-light: #F0D68A;
      --gold-dark: #A8832E;
      --bg: #0B1426;
      --bg-light: #121E36;
      --pink: #F2C4CE;
      --warm-white: #FFF8F0;
      --font-title: 'Noto Serif SC', 'Songti SC', serif;
      --font-body: 'Noto Sans SC', 'PingFang SC', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--warm-white);
      overflow-x: hidden;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ========== Particles Canvas ========== */
    #particleCanvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }

    /* ========== Page Structure ========== */
    .page { position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

    /* ========== Header ========== */
    .header {
      text-align: center; padding: 48px 24px 16px; position: relative;
    }
    .header::after {
      content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 120px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .brand-en {
      font-family: var(--font-body); font-size: 13px; letter-spacing: 6px;
      color: var(--gold); text-transform: uppercase; margin-bottom: 12px; font-weight: 500;
    }
    .brand-cn {
      font-family: var(--font-title); font-size: clamp(28px, 5vw, 42px);
      font-weight: 900; color: var(--gold-light);
      text-shadow: 0 0 40px rgba(212,168,73,0.3);
      margin-bottom: 8px; letter-spacing: 4px;
    }
    .brand-sub {
      font-family: var(--font-title); font-size: clamp(16px, 3vw, 22px);
      font-weight: 600; color: var(--pink); margin-bottom: 6px; letter-spacing: 2px;
    }
    .brand-date {
      font-size: 13px; color: rgba(255,248,240,0.5); margin-top: 8px; letter-spacing: 1px;
    }

    /* ========== Intro Section ========== */
    .intro {
      max-width: 720px; padding: 24px 24px 8px; text-align: center;
      font-size: 14px; line-height: 2; color: rgba(255,248,240,0.75);
    }
    .intro em {
      font-style: normal; color: var(--gold-light); font-weight: 500;
    }

    /* ========== Wheel Section ========== */
    .wheel-section {
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px 40px; position: relative; width: 100%;
    }
    .wheel-hint {
      font-family: var(--font-title); font-size: 15px; color: var(--gold);
      letter-spacing: 3px; margin-bottom: 20px;
      animation: hintPulse 2.5s ease-in-out infinite;
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .wheel-outer {
      position: relative; display: flex; align-items: center; justify-content: center;
    }

    /* Glow ring around wheel */
    .wheel-glow {
      position: absolute; width: calc(100% + 40px); height: calc(100% + 40px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,168,73,0.15) 0%, transparent 70%);
      animation: glowPulse 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes glowPulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.06); opacity: 1; }
    }

    /* Pointer */
    .pointer {
      position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
      z-index: 20; width: 0; height: 0;
      border-left: 16px solid transparent; border-right: 16px solid transparent;
      border-top: 30px solid var(--gold);
      filter: drop-shadow(0 2px 8px rgba(212,168,73,0.6));
    }
    .pointer::after {
      content: ''; position: absolute; top: -34px; left: -8px;
      width: 0; height: 0;
      border-left: 8px solid transparent; border-right: 8px solid transparent;
      border-top: 16px solid var(--gold-light);
    }

    /* Wheel container that rotates */
    .wheel-wrapper {
      width: clamp(300px, 75vw, 480px); height: clamp(300px, 75vw, 480px);
      position: relative; border-radius: 50%;
      transition: transform 4s cubic-bezier(0.17, 0.67, 0.08, 0.98);
      will-change: transform;
    }
    .wheel-wrapper.spinning {
      transition: transform 5s cubic-bezier(0.12, 0.7, 0.06, 0.98);
    }
    .wheel-wrapper canvas {
      width: 100%; height: 100%; border-radius: 50%;
    }

    /* Center hub */
    .wheel-center {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80px; height: 80px; border-radius: 50%; z-index: 10;
      background: radial-gradient(circle at 35% 35%, var(--gold-light), var(--gold-dark));
      box-shadow: 0 0 30px rgba(212,168,73,0.5), inset 0 2px 4px rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; cursor: pointer;
    }
    .wheel-center-text {
      font-family: var(--font-title); font-size: 16px; font-weight: 900;
      color: var(--red-deep); line-height: 1.2; text-align: center;
    }
    .wheel-center-text small { font-size: 10px; font-weight: 600; display: block; }

    /* Spin button */
    .spin-btn {
      margin-top: 28px; padding: 14px 48px;
      font-family: var(--font-title); font-size: 16px; font-weight: 700;
      color: var(--bg); letter-spacing: 3px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 20px rgba(212,168,73,0.4);
      transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .spin-btn:hover {
      transform: translateY(-2px); box-shadow: 0 6px 30px rgba(212,168,73,0.6);
    }
    .spin-btn:active { transform: translateY(0); }
    .spin-btn:disabled {
      opacity: 0.5; cursor: not-allowed; transform: none;
      box-shadow: 0 2px 10px rgba(212,168,73,0.2);
    }
    .spin-btn::after {
      content: ''; position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
      animation: btnShine 3s ease-in-out infinite;
    }
    @keyframes btnShine {
      0% { transform: translateX(-100%) rotate(45deg); }
      30%, 100% { transform: translateX(100%) rotate(45deg); }
    }

    /* ========== Overlay & Content Card ========== */
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11,20,38,0.85); backdrop-filter: blur(8px);
      z-index: 100; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease; padding: 24px;
    }
    .overlay.active { opacity: 1; pointer-events: auto; }

    .content-card {
      background: var(--warm-white); border-radius: 16px; padding: 36px 32px;
      max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto;
      color: #2A1A1A; position: relative;
      transform: translateY(60px); opacity: 0;
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s ease;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .overlay.active .content-card { transform: translateY(0); opacity: 1; }

    .content-card::-webkit-scrollbar { width: 4px; }
    .content-card::-webkit-scrollbar-track { background: transparent; }
    .content-card::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

    .card-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
      padding-bottom: 16px; border-bottom: 2px solid var(--gold);
    }
    .card-icon {
      width: 48px; height: 48px; border-radius: 12px; display: flex;
      align-items: center; justify-content: center; font-size: 24px;
      background: linear-gradient(135deg, var(--red), var(--red-deep));
      color: var(--gold-light); flex-shrink: 0;
    }
    .card-title {
      font-family: var(--font-title); font-size: 22px; font-weight: 700;
      color: var(--red); line-height: 1.3;
    }
    .card-subtitle {
      font-size: 13px; color: var(--gold-dark); margin-top: 2px;
    }

    .card-body { font-size: 15px; line-height: 2; color: #3A2A2A; }
    .card-body p { margin-bottom: 14px; text-indent: 2em; }
    .card-body p:last-child { margin-bottom: 0; }
    .card-body .highlight {
      color: var(--red); font-weight: 600;
    }
    .card-body .stat {
      display: inline-block; background: linear-gradient(135deg, #FFF5E6, #FFE8C8);
      padding: 2px 10px; border-radius: 6px; font-weight: 700;
      color: var(--red-deep); font-size: 14px; margin: 0 2px;
      border: 1px solid rgba(212,168,73,0.3);
    }

    .close-btn {
      position: absolute; top: 16px; right: 16px; width: 36px; height: 36px;
      border-radius: 50%; border: 2px solid rgba(196,30,58,0.2);
      background: transparent; color: var(--red); font-size: 20px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease; line-height: 1;
    }
    .close-btn:hover {
      background: var(--red); color: white; border-color: var(--red);
    }

    /* ========== Segment Legend ========== */
    .legend {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
      max-width: 600px; width: 100%; padding: 0 16px 40px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px; padding: 8px 10px;
      background: rgba(255,248,240,0.05); border-radius: 8px;
      border: 1px solid rgba(212,168,73,0.15); cursor: pointer;
      transition: all 0.3s ease; font-size: 12px;
    }
    .legend-item:hover {
      background: rgba(212,168,73,0.12); border-color: var(--gold);
      transform: translateY(-1px);
    }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .legend-dot.red { background: var(--red); }
    .legend-dot.gold { background: var(--gold); }

    /* ========== Footer ========== */
    .footer {
      text-align: center; padding: 24px; font-size: 12px;
      color: rgba(255,248,240,0.3); border-top: 1px solid rgba(212,168,73,0.1);
      width: 100%; margin-top: auto;
    }

    /* ========== Responsive ========== */
    @media (max-width: 640px) {
      .header { padding: 32px 16px 12px; }
      .brand-en { font-size: 11px; letter-spacing: 4px; }
      .intro { font-size: 13px; padding: 16px 16px 4px; }
      .wheel-center { width: 60px; height: 60px; }
      .wheel-center-text { font-size: 13px; }
      .wheel-center-text small { font-size: 8px; }
      .spin-btn { padding: 12px 36px; font-size: 14px; }
      .content-card { padding: 28px 20px; }
      .card-title { font-size: 18px; }
      .card-body { font-size: 14px; }
      .legend { grid-template-columns: repeat(2, 1fr); gap: 6px; }
      .pointer { top: -14px; border-left-width: 12px; border-right-width: 12px; border-top-width: 24px; }
      .pointer::after { top: -28px; border-left-width: 6px; border-right-width: 6px; border-top-width: 12px; }
    }

    /* ========== Selection indicator ========== */
    .segment-active {
      animation: segmentGlow 1.5s ease-in-out infinite;
    }
    @keyframes segmentGlow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }

    /* ========== Lotus decorative SVG ========== */
    .lotus-deco {
      position: fixed; pointer-events: none; z-index: 0; opacity: 0.06;
    }
    .lotus-deco.left { left: -60px; top: 20%; width: 200px; transform: rotate(-15deg); }
    .lotus-deco.right { right: -60px; bottom: 10%; width: 200px; transform: rotate(15deg); }
  </style>
</head>

    const SEG_COUNT = segments.length;
    const SEG_ANGLE = 360 / SEG_COUNT; // 45 degrees

    /* ========== Draw Wheel ========== */
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const SIZE = 960;
    const CENTER = SIZE / 2;
    const RADIUS = SIZE / 2 - 20;

    function drawWheel() {
      ctx.clearRect(0, 0, SIZE, SIZE);

      // Draw outer ring
      ctx.beginPath();
      ctx.arc(CENTER, CENTER, RADIUS + 8, 0, Math.PI * 2);
      ctx.strokeStyle = '#D4A849';
      ctx.lineWidth = 4;
      ctx.stroke();

      // Draw segments
      for (let i = 0; i < SEG_COUNT; i++) {
        const startAngle = (i * SEG_ANGLE - 90) * Math.PI / 180;
        const endAngle = ((i + 1) * SEG_ANGLE - 90) * Math.PI / 180;
        const isRed = segments[i].color === 'red';

        // Segment fill
        ctx.beginPath();
        ctx.moveTo(CENTER, CENTER);
        ctx.arc(CENTER, CENTER, RADIUS, startAngle, endAngle);
        ctx.closePath();

        // Gradient fill
        const midAngle = ((i + 0.5) * SEG_ANGLE - 90) * Math.PI / 180;
        const gx = CENTER + RADIUS * 0.5 * Math.cos(midAngle);
        const gy = CENTER + RADIUS * 0.5 * Math.sin(midAngle);
        const grad = ctx.createRadialGradient(CENTER, CENTER, 60, CENTER, CENTER, RADIUS);
        if (isRed) {
          grad.addColorStop(0, '#D4273F');
          grad.addColorStop(1, '#9A1830');
        } else {
          grad.addColorStop(0, '#E8C35A');
          grad.addColorStop(1, '#A8832E');
        }
        ctx.fillStyle = grad;
        ctx.fill();

        // Segment border
        ctx.beginPath();
        ctx.moveTo(CENTER, CENTER);
        ctx.arc(CENTER, CENTER, RADIUS, startAngle, startAngle);
        ctx.lineTo(CENTER + RADIUS * Math.cos(startAngle), CENTER + RADIUS * Math.sin(startAngle));
        ctx.strokeStyle = 'rgba(255,248,240,0.2)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Draw segment text
        ctx.save();
        ctx.translate(CENTER, CENTER);
        ctx.rotate(midAngle);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Icon
        ctx.font = '32px sans-serif';
        ctx.fillStyle = isRed ? '#F0D68A' : '#5A1A1A';
        ctx.fillText(segments[i].icon, RADIUS * 0.58, 0);

        // Label
        ctx.font = '700 24px "Noto Serif SC", "Songti SC", serif';
        ctx.fillStyle = isRed ? '#F0D68A' : '#7A1A1A';
        const label = segments[i].label;
        // Draw each character vertically
        for (let c = 0; c < label.length; c++) {
          ctx.fillText(label[c], RADIUS * 0.76, (c - (label.length - 1) / 2) * 30);
        }

        ctx.restore();
      }

      // Inner decorative ring
      ctx.beginPath();
      ctx.arc(CENTER, CENTER, 52, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(212,168,73,0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Outer decorative dots
      for (let i = 0; i < 32; i++) {
        const angle = (i * 11.25) * Math.PI / 180;
        const dotR = i % 4 === 0 ? 4 : 2;
        ctx.beginPath();
        ctx.arc(
          CENTER + (RADIUS + 2) * Math.cos(angle),
          CENTER + (RADIUS + 2) * Math.sin(angle),
          dotR, 0, Math.PI * 2
        );
        ctx.fillStyle = i % 4 === 0 ? '#F0D68A' : 'rgba(240,214,138,0.4)';
        ctx.fill();
      }
    }

    drawWheel();

    /* ========== Build Legend ========== */
    const legendEl = document.getElementById('legend');
    segments.forEach((seg, i) => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-dot ${seg.color}"></span><span>${seg.label}</span>`;
      item.addEventListener('click', () => showContent(i));
      legendEl.appendChild(item);
    });

    /* ========== Spin Logic ========== */
    const wheelWrapper = document.getElementById('wheelWrapper');
    const spinBtn = document.getElementById('spinBtn');
    const wheelCenter = document.getElementById('wheelCenter');
    let currentRotation = 0;
    let isSpinning = false;

    function spinWheel() {
      if (isSpinning) return;
      isSpinning = true;
      spinBtn.disabled = true;

      // Random 5-8 full rotations + random offset
      const extraRotations = 5 + Math.floor(Math.random() * 4);
      const targetSegment = Math.floor(Math.random() * SEG_COUNT);
      // Calculate the angle so the pointer (at top, -90deg) points to the target segment
      // Segment i center is at (i * 45 + 22.5) degrees from top
      const targetAngle = 360 - (targetSegment * SEG_ANGLE + SEG_ANGLE / 2);
      const totalRotation = extraRotations * 360 + targetAngle;
      currentRotation += totalRotation;

      wheelWrapper.classList.add('spinning');
      wheelWrapper.style.transform = `rotate(${currentRotation}deg)`;

      // After spin ends
      const onEnd = () => {
        isSpinning = false;
        spinBtn.disabled = false;
        wheelWrapper.classList.remove('spinning');
        wheelWrapper.removeEventListener('transitionend', onEnd);
        showContent(targetSegment);
      };
      wheelWrapper.addEventListener('transitionend', onEnd);
    }

    spinBtn.addEventListener('click', spinWheel);
    wheelCenter.addEventListener('click', spinWheel);

    /* ========== Content Display ========== */
    const overlay = document.getElementById('overlay');
    const cardTitle = document.getElementById('cardTitle');
    const cardSubtitle = document.getElementById('cardSubtitle');
    const cardIcon = document.getElementById('cardIcon');
    const cardBody = document.getElementById('cardBody');
    const closeBtn = document.getElementById('closeBtn');

    function showContent(index) {
      const seg = segments[index];
      cardIcon.textContent = seg.icon;
      cardTitle.textContent = seg.label;
      cardSubtitle.textContent = seg.subtitle;
      cardBody.innerHTML = seg.body;
      overlay.classList.add('active');
    }

    function hideContent() {
      overlay.classList.remove('active');
    }

    closeBtn.addEventListener('click', hideContent);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) hideContent();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideContent();
    });

    /* ========== Petal Particles ========== */
    const pCanvas = document.getElementById('particleCanvas');
    const pCtx = pCanvas.getContext('2d');
    let petals = [];

    function resizeParticleCanvas() {
      pCanvas.width = window.innerWidth;
      pCanvas.height = window.innerHeight;
    }
    resizeParticleCanvas();
    window.addEventListener('resize', resizeParticleCanvas);

    class Petal {
      constructor() {
        this.reset();
        this.y = Math.random() * pCanvas.height;
      }
      reset() {
        this.x = Math.random() * pCanvas.width;
        this.y = -20;
        this.size = 4 + Math.random() * 8;
        this.speedY = 0.3 + Math.random() * 0.8;
        this.speedX = -0.2 + Math.random() * 0.4;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.02;
        this.opacity = 0.15 + Math.random() * 0.25;
        this.hue = Math.random() > 0.5 ? 350 : 40; // pink or gold
      }
      update() {
        this.y += this.speedY;
        this.x += this.speedX + Math.sin(this.y * 0.005) * 0.3;
        this.rotation += this.rotSpeed;
        if (this.y > pCanvas.height + 20) this.reset();
      }
      draw() {
        pCtx.save();
        pCtx.translate(this.x, this.y);
        pCtx.rotate(this.rotation);
        pCtx.globalAlpha = this.opacity;
        pCtx.beginPath();
        // Draw a petal shape
        pCtx.moveTo(0, 0);
        pCtx.bezierCurveTo(this.size * 0.5, -this.size, this.size, -this.size * 0.5, 0, this.size);
        pCtx.bezierCurveTo(-this.size, -this.size * 0.5, -this.size * 0.5, -this.size, 0, 0);
        if (this.hue === 350) {
          pCtx.fillStyle = '#F2C4CE';
        } else {
          pCtx.fillStyle = '#F0D68A';
        }
        pCtx.fill();
        pCtx.restore();
      }
    }

    // Create petals
    for (let i = 0; i < 35; i++) {
      petals.push(new Petal());
    }

    function animatePetals() {
      pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
      petals.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animatePetals);
    }
    animatePetals();
  </script>
